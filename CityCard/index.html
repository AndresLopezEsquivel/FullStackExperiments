<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--Elms Sans-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <!--Montserrat-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <!-- Happy Monkey -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/styles.css">
  <title>Mexico City</title>
</head>
<body class="elms-sans-regular">

    <header>
      <div class="nav-title">
        Mexico
      </div>
      <div class="nav-btns">
        <a href="#" class="btn-primary">Places</a>
        <a href="#" class="btn-primary">Opinions</a>
      </div>
    </header>

    <div class="banner">
      <div class="main-card">
        <p>Mexico City</p>
      </div>
    </div>

    <div class="container">
      <div class="card">
        <img src="./img/unam-library.png" alt="UNAM's library">
        <div class="container-info">
          <div class="container-description">
            <h2>UNAM's library</h2>
            <p>Description</p>
          </div>
          <p class="container-price">$0</p>
        </div>
      </div>

      <div class="card">
        <img src="./img/cdmx-zocalo.png" alt="CDMX's Zócalo">
        <div class="container-info">
          <div class="container-description">
            <h2>Zócalo</h2>
            <p>Description</p>
          </div>
          <p class="container-price">$0</p>
        </div>
      </div>

      <div class="card">
        <img src="./img/cdmx-chapultepec.png" alt="CDMX's Chapultepec">
        <div class="container-info">
          <div class="container-description">
            <h2>Chapultepec</h2>
            <p>Description</p>
          </div>
          <p class="container-price">$10</p>
        </div>
      </div>
    </div>

    <footer>
      <p>This site was coded with ♥️ by QT-1</p>
    </footer>
</body>
</html>
